<!DOCTYPE html>
<html>
  <head>
    <title>My Page</title>
    <script src="script.js" defer></script>
  </head>
  <body>
    <div id="header">
      <div>
        <h1>Welcome to the Country Guessing Game</h1>
      </div>
    </div>
    <div id="gameplay-area">
      <label>Guess Country Name</label>
      <input id = "guess-field">
      <button id="guess-btn">Submit</button>
      <button id="reset-btn">Reset</button>
    </div>
    <div id="game-info">
      <p>Country name: <span id="secret-country">???</span></p>
      <p>Country first letter: <span id="first-letter"></span></p>
      <p>Points: <span id="score">200</span></p>
      <ul id="hint-list">
        <li id="hint-1">Hint #1:</li>
      </ul>
    </div>
  </body>
</html>
